name: Validate fair.md

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: pip install pyyaml jsonschema
      - name: Check the JSON Schema is well-formed
        run: python -c "import json; json.load(open('schema/fair.schema.json'))"
      - name: Validate example manifests
        run: python tools/validate_fair.py
